name: Improvement
description: Suggest an improvement to existing functionality
labels: ["improvement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement!
  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: How does it currently work?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Improvement
      description: How should it work instead?
    validations:
      required: true
